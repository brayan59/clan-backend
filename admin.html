<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel Admin - Reclutamiento</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="login-card" id="loginCard">
    <h1>🔒 Panel Admin</h1>
    <input id="pin" type="password" placeholder="PIN de acceso">
    <button onclick="login()">Entrar</button>
    <div class="error" id="loginError"></div>
  </div>

  <div class="container" id="container">
    <h1>📋 Postulantes al Clan</h1>
    <button class="refresh" onclick="cargar()">🔄 Actualizar lista</button>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Apodo</th>
          <th>UID</th>
          <th>BR pts</th>
          <th>CS pts</th>
          <th>HS%</th>
          <th>Torneos</th>
          <th>PvP</th>
          <th>Puntaje</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

<script src="admin.js"></script>
</body>
</html>

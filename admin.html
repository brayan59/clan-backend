<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel Admin - Reclutamiento</title>
<style>
  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --accent:#ff6b35;
    --accent2:#2dd4a8;
    --text:#e6edf3;
    --muted:#8b949e;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Roboto, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px;
  }
  .login-card{
    max-width:360px;
    margin:80px auto;
    background:var(--panel);
    border:1px solid #30363d;
    border-radius:14px;
    padding:32px;
  }
  .login-card input{
    width:100%;
    padding:11px 12px;
    border-radius:8px;
    border:1px solid #30363d;
    background:#0d1117;
    color:var(--text);
    font-size:15px;
    margin-bottom:14px;
  }
  .login-card button, .top-bar button{
    width:100%;
    padding:11px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#0d1117;
    font-weight:600;
    cursor:pointer;
  }
  h1{color:var(--accent); font-size:22px;}
  .container{display:none; max-width:1000px; margin:0 auto;}
  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border-radius:10px;
    overflow:hidden;
    margin-top:16px;
  }
  th, td{
    padding:10px 12px;
    text-align:left;
    border-bottom:1px solid #21262d;
    font-size:13px;
  }
  th{color:var(--muted); font-weight:600;}
  tr:hover{background:#1c2128;}
  .badge{
    padding:3px 8px;
    border-radius:6px;
    font-size:11px;
    font-weight:600;
  }
  .badge.pendiente{background:#3d2e0e; color:#f0b429;}
  .badge.aceptado{background:#0e3d1f; color:var(--accent2);}
  .badge.rechazado{background:#3d0e0e; color:var(--danger);}
  .actions button{
    padding:5px 10px;
    border:none;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
    margin-right:4px;
    color:#0d1117;
    font-weight:600;
  }
  .btn-aceptar{background:var(--accent2);}
  .btn-rechazar{background:var(--danger);}
  .btn-whatsapp{background:#25D366;}
  .error{color:var(--danger); margin-top:10px;}
  .refresh{margin-top:16px; background:#21262d; color:var(--text); border:1px solid #30363d;}
</style>
</head>
<body>

  <div class="login-card" id="loginCard">
    <h1>🔒 Panel Admin</h1>
    <input id="pin" type="password" placeholder="PIN de acceso">
    <button onclick="login()">Entrar</button>
    <div class="error" id="loginError"></div>
  </div>

  <div class="container" id="container">
    <h1>📋 Postulantes al Clan</h1>
    <button class="refresh" onclick="cargar()">🔄 Actualizar lista</button>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Apodo</th>
          <th>UID</th>
          <th>BR pts</th>
          <th>CS pts</th>
          <th>HS%</th>
          <th>Torneos</th>
          <th>PvP</th>
          <th>Puntaje</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

<script>
// ⚠️ Cambia este PIN por el que tú quieras
const ADMIN_PIN = "brayan.070809";
const BACKEND_URL = "https://clan-backend-cpu4.onrender.com"; // tu URL de Render

function login(){
  const pin = document.getElementById('pin').value;
  if(pin === ADMIN_PIN){
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('container').style.display = 'block';
    cargar();
  } else {
    document.getElementById('loginError').textContent = 'PIN incorrecto.';
  }
}

async function cargar(){
  try{
    const res = await fetch(`${BACKEND_URL}/api/postulaciones`);
    const lista = await res.json();
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    lista.forEach((p, i) => {
      const tel = (p.telefono || '').replace(/\D/g,'');
      const msg = encodeURIComponent(`¡Hola ${p.nombreReal}! Fuiste aceptado en el clan. Te esperamos hoy a la hora indicada en el juego. Únete al grupo:https://chat.whatsapp.com/Hy6ELgIvIwvJ5wFCQaoJYr`);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${p.nombreReal}</td>
        <td>${p.apodo}</td>
        <td>${p.uid}</td>
        <td>${p.brRankPoint}</td>
        <td>${p.csRankPoint}</td>
        <td>${p.tasaHeadshot}</td>
        <td style="font-size:11px">${p.experienciaTorneos}</td>
        <td>${p.experienciaPvp}</td>
        <td><strong>${p.puntajeFinal}</strong></td>
        <td><span class="badge ${p.estado}">${p.estado}</span></td>
        <td class="actions">
          <button class="btn-aceptar" onclick="cambiarEstado('${p._id}','aceptado')">Aceptar</button>
          <button class="btn-rechazar" onclick="cambiarEstado('${p._id}','rechazado')">Rechazar</button>
          <a href="https://wa.me/${tel}?text=${msg}" target="_blank"><button class="btn-whatsapp">WhatsApp</button></a>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }catch(err){
    alert('Error al cargar postulaciones: ' + err.message);
  }
}

async function cambiarEstado(id, estado){
  try{
    await fetch(`${BACKEND_URL}/api/postulaciones/${id}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({estado})
    });
    cargar();
  }catch(err){
    alert('Error al actualizar: ' + err.message);
  }
}
</script>
</body>
</html>
